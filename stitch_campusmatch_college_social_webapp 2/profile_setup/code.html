<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400;1,700&amp;family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container-lowest": "#0d0d1a",
                    "surface-container-high": "#292937",
                    "surface-dim": "#12121f",
                    "on-primary-fixed-variant": "#8d0051",
                    "error": "#ffb4ab",
                    "background": "#12121f",
                    "surface-bright": "#383847",
                    "on-tertiary-container": "#013200",
                    "outline": "#a88892",
                    "on-secondary-container": "#e299ff",
                    "on-primary-container": "#580030",
                    "tertiary": "#69df54",
                    "inverse-primary": "#b8006c",
                    "on-surface-variant": "#e1bdc8",
                    "surface-container-low": "#1a1a28",
                    "secondary-fixed-dim": "#ebb2ff",
                    "inverse-surface": "#e3e0f4",
                    "outline-variant": "#594048",
                    "error-container": "#93000a",
                    "on-surface": "#e3e0f4",
                    "on-error": "#690005",
                    "surface-variant": "#343342",
                    "surface-container-highest": "#343342",
                    "on-primary-fixed": "#3e0021",
                    "on-background": "#e3e0f4",
                    "secondary-fixed": "#f8d8ff",
                    "surface-tint": "#ffb0cc",
                    "tertiary-container": "#2ea620",
                    "on-tertiary-fixed": "#012200",
                    "on-tertiary-fixed-variant": "#035300",
                    "tertiary-fixed": "#85fd6d",
                    "on-primary": "#640038",
                    "surface": "#12121f",
                    "on-secondary-fixed-variant": "#721199",
                    "secondary-container": "#721199",
                    "on-secondary-fixed": "#320047",
                    "primary-container": "#ff46a0",
                    "primary": "#ffb0cc",
                    "surface-container": "#1e1e2c",
                    "inverse-on-surface": "#2f2f3d",
                    "primary-fixed-dim": "#ffb0cc",
                    "secondary": "#ebb2ff",
                    "tertiary-fixed-dim": "#69df54",
                    "primary-fixed": "#ffd9e4",
                    "on-tertiary": "#013a00",
                    "on-secondary": "#520071",
                    "on-error-container": "#ffdad6"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Noto Serif"],
                    "body": ["Plus Jakarta Sans"],
                    "label": ["Plus Jakarta Sans"]
            }
          },
        }
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(52, 51, 66, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .progress-glow {
            box-shadow: 0 0 15px rgba(255, 70, 160, 0.4);
        }
        .custom-dashed {
            background-image: url("data:image/svg+xml,%3csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3e%3crect width='100%25' height='100%25' fill='none' rx='100' ry='100' stroke='%23ff46a0' stroke-width='3' stroke-dasharray='10%2c 12' stroke-dashoffset='0' stroke-linecap='square'/%3e%3c/svg%3e");
        }
    </style>
</head>
<body class="bg-surface-container-lowest text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container min-h-screen pb-20">
<!-- Top Navigation Bar -->
<nav class="fixed top-0 w-full z-50 flex justify-between items-center px-6 py-4 bg-slate-950/40 backdrop-blur-xl border-none shadow-none shadow-[0_0_20px_rgba(233,30,140,0.1)]">
<div class="font-serif italic font-bold text-transparent bg-clip-text bg-gradient-to-br from-pink-400 to-pink-600 font-serif text-2xl tracking-tighter">
            CampusMatch
        </div>
<div class="flex items-center gap-6">
<span class="material-symbols-outlined text-slate-400 hover:scale-105 transition-transform cursor-pointer" data-icon="favorite">favorite</span>
<span class="material-symbols-outlined text-slate-400 hover:scale-105 transition-transform cursor-pointer" data-icon="notifications">notifications</span>
</div>
</nav>
<!-- Main Canvas -->
<main class="pt-24 px-4 sm:px-6 lg:px-8 max-w-4xl mx-auto">
<!-- Header & Progress -->
<header class="mb-10 text-center lg:text-left">
<h1 class="font-headline text-4xl font-bold tracking-tight mb-4 bg-clip-text text-transparent bg-gradient-to-r from-on-surface to-primary">
                Complete Your Profile
            </h1>
<div class="w-full bg-surface-container-high h-2 rounded-full overflow-hidden mb-2">
<div class="h-full w-3/4 bg-gradient-to-r from-primary to-primary-container progress-glow rounded-full"></div>
</div>
<div class="flex justify-between items-center px-1">
<span class="text-label text-xs uppercase tracking-widest text-primary font-bold">Step 3 of 4</span>
<span class="text-label text-xs uppercase tracking-widest text-on-surface-variant font-bold">75% Finished</span>
</div>
</header>
<!-- Profile Setup Container -->
<div class="glass-panel border border-outline-variant/10 rounded-xl p-8 lg:p-12 shadow-2xl relative overflow-hidden">
<!-- Decorative Accent -->
<div class="absolute -top-24 -right-24 w-64 h-64 bg-primary/5 rounded-full blur-3xl"></div>
<form class="grid grid-cols-1 md:grid-cols-12 gap-8 relative z-10">
<!-- Avatar Upload Zone -->
<div class="md:col-span-12 flex flex-col items-center justify-center mb-6">
<div class="relative group">
<div class="w-40 h-40 rounded-full custom-dashed flex items-center justify-center p-2 transition-transform duration-500 group-hover:rotate-12">
<div class="w-full h-full rounded-full bg-surface-container-high flex items-center justify-center overflow-hidden border-4 border-surface-container-lowest">
<span class="material-symbols-outlined text-primary text-5xl opacity-40 group-hover:opacity-100 transition-opacity" data-icon="add_a_photo">add_a_photo</span>
</div>
</div>
<button class="absolute bottom-1 right-1 bg-primary-container text-on-primary-container w-10 h-10 rounded-full flex items-center justify-center shadow-lg hover:scale-110 active:scale-95 transition-all" type="button">
<span class="material-symbols-outlined text-sm" data-icon="edit">edit</span>
</button>
</div>
<p class="mt-4 text-label text-sm text-on-surface-variant font-medium">Upload your campus vibe</p>
</div>
<!-- Form Fields -->
<div class="md:col-span-8 space-y-2">
<label class="block text-label text-sm font-bold text-primary tracking-wide ml-1">Full Name</label>
<input class="w-full bg-surface-container-low border-b border-outline/30 focus:border-primary focus:ring-0 text-on-surface px-4 py-3 rounded-t-lg transition-all placeholder:text-on-surface-variant/30" placeholder="Alex Rivers" type="text"/>
</div>
<div class="md:col-span-4 space-y-2">
<label class="block text-label text-sm font-bold text-primary tracking-wide ml-1">Age</label>
<input class="w-full bg-surface-container-low border-b border-outline/30 focus:border-primary focus:ring-0 text-on-surface px-4 py-3 rounded-t-lg transition-all" placeholder="21" type="number"/>
</div>
<div class="md:col-span-6 space-y-2">
<label class="block text-label text-sm font-bold text-primary tracking-wide ml-1">Branch</label>
<div class="relative">
<select class="w-full bg-surface-container-low border-b border-outline/30 focus:border-primary focus:ring-0 text-on-surface px-4 py-3 rounded-t-lg appearance-none transition-all">
<option>Computer Science</option>
<option>Mechanical Engineering</option>
<option>Architecture</option>
<option>Business Management</option>
<option>Fine Arts</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none" data-icon="expand_more">expand_more</span>
</div>
</div>
<div class="md:col-span-3 space-y-2">
<label class="block text-label text-sm font-bold text-primary tracking-wide ml-1">Year</label>
<select class="w-full bg-surface-container-low border-b border-outline/30 focus:border-primary focus:ring-0 text-on-surface px-4 py-3 rounded-t-lg appearance-none transition-all">
<option>1st Year</option>
<option>2nd Year</option>
<option>3rd Year</option>
<option>4th Year</option>
</select>
</div>
<div class="md:col-span-3 space-y-2">
<label class="block text-label text-sm font-bold text-primary tracking-wide ml-1">Division</label>
<input class="w-full bg-surface-container-low border-b border-outline/30 focus:border-primary focus:ring-0 text-on-surface px-4 py-3 rounded-t-lg transition-all" placeholder="Sec-A" type="text"/>
</div>
<!-- Toggle Switch -->
<div class="md:col-span-12 py-4">
<div class="bg-surface-container-low rounded-xl p-1 flex items-center w-fit border border-outline-variant/10">
<button class="px-6 py-2 rounded-lg text-sm font-bold transition-all bg-primary-container text-on-primary-container shadow-lg" type="button">Hostel</button>
<button class="px-6 py-2 rounded-lg text-sm font-bold transition-all text-on-surface-variant hover:text-on-surface" type="button">Day Scholar</button>
</div>
</div>
<div class="md:col-span-12 space-y-2">
<label class="block text-label text-sm font-bold text-primary tracking-wide ml-1">Bio</label>
<textarea class="w-full bg-surface-container-low border-b border-outline/30 focus:border-primary focus:ring-0 text-on-surface px-4 py-3 rounded-t-lg transition-all resize-none" placeholder="Coffee lover, late-night coder, and looking for someone to explore the campus library's hidden corners with..." rows="4"></textarea>
</div>
<!-- Submit Button -->
<div class="md:col-span-12 pt-6">
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary-container font-bold text-lg py-4 rounded-full shadow-[0_0_30px_rgba(233,30,140,0.4)] hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-2" type="submit">
<span>Launch Your Profile</span>
<span class="material-symbols-outlined" data-icon="rocket_launch">rocket_launch</span>
</button>
</div>
</form>
</div>
<!-- Secondary Guidance -->
<p class="mt-8 text-center text-on-surface-variant text-sm font-medium italic opacity-60">
            "Your profile is your digital aura. Make it shine."
        </p>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-8 pt-4 bg-slate-950/60 backdrop-blur-2xl border-t border-white/5 shadow-[0_-4px_30px_rgba(0,0,0,0.5)] rounded-t-[2.5rem]">
<div class="flex flex-col items-center justify-center text-slate-500 px-5 py-2 hover:text-pink-300 transition-colors active:scale-90 duration-300">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-sans text-[10px] font-bold uppercase tracking-widest mt-1">Home</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-500 px-5 py-2 hover:text-pink-300 transition-colors active:scale-90 duration-300">
<span class="material-symbols-outlined" data-icon="explore">explore</span>
<span class="font-sans text-[10px] font-bold uppercase tracking-widest mt-1">Discover</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-500 px-5 py-2 hover:text-pink-300 transition-colors active:scale-90 duration-300">
<span class="material-symbols-outlined" data-icon="chat_bubble">chat_bubble</span>
<span class="font-sans text-[10px] font-bold uppercase tracking-widest mt-1">Messages</span>
</div>
<div class="flex flex-col items-center justify-center text-pink-500 bg-pink-500/10 rounded-full px-5 py-2 shadow-[0_0_15px_rgba(233,30,140,0.3)] active:scale-90 duration-300">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-sans text-[10px] font-bold uppercase tracking-widest mt-1">Profile</span>
</div>
</nav>
</body></html>
